[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "check-added-large-files" },
    { id = "end-of-file-fixer" },
    { id = "check-json" },
    { id = "check-toml" },
    { id = "check-yaml" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt", name = "cargo fmt", language = "system", entry = "cargo fmt", files = "\\.rs$", pass_filenames = false },
]
